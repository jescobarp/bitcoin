<!DOCTYPE html>
<html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bitcoin Acceptance Census</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<style>html,body,#map{height:100%;margin:0}#panel{position:absolute;z-index:1000;left:10px;top:10px;background:#fff;padding:8px;border-radius:6px}</style>
</head><body><div id="panel">Bitcoin Acceptance Census<br><span id="count">Cargando...</span></div><div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script>
const map=L.map('map').setView([13.79,-88.9],8);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'©OSM'}).addTo(map);
Papa.parse('Bitcoin acceptance census. - Census Data.csv',{
download:true,header:true,
complete:r=>{
let c=0;
r.data.forEach(row=>{
 if(!row.Adress)return;
 let p=row.Adress.split(',');
 if(p.length<2)return;
 let lat=parseFloat(p[0]),lng=parseFloat(p[1]);
 if(isNaN(lat)||isNaN(lng))return;
 c++;
 let color=(row.Acceptance||'').toLowerCase().includes('yes')?'green':'red';
 L.circleMarker([lat,lng],{radius:3,color,fillColor:color,fillOpacity:.8,weight:0}).addTo(map)
 .bindPopup(`<b>${row.Business||''}</b><br>${row.Category||''}<br>${row.Department||''}<br>${row.District||''}<br>${row.Acceptance||''}`);
});
document.getElementById('count').textContent=`${c} negocios cargados`;
}
});
</script></body></html>
